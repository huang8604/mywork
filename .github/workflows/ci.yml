name: ci

# Phase-5 pipeline. PRs and pushes to main both run all gates; only a push to
# main publishes the image to GHCR with `latest` + `sha-<short>` tags. There is
# no automatic NAS deploy — the operator manually Pulls + Recreates in Portainer.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # GHCR images are namespaced by the repo owner; the package name is fixed.
  IMAGE: ghcr.io/${{ github.repository_owner }}/vocab-app

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (editable + test + ruff)
        run: pip install -e '.[test]' ruff
      - name: Ruff (static checks)
        run: ruff check app tests
      - name: Pytest
        # Full suite covers scopes/audit, idempotency, optimistic locking,
        # batch-result atomicity and the Skill end-to-end (generate -> round ->
        # batch three-state). Run with LAN-prod-style trusted-hosts.
        run: pytest -q

  frontend:
    name: frontend (typecheck + unit + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install (npm ci from lockfile)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (vitest)
        run: npm run test
      - name: Build
        run: npm run build

  contract:
    name: contract (openapi up to date)
    needs: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (base, for export_openapi)
        run: pip install -e '.'
      - name: Regenerate OpenAPI
        # Importing app.main validates Settings, which requires a pepper. OpenAPI
        # generation never uses it, so a dummy value is fine here.
        env:
          API_TOKEN_PEPPER: ci-openapi-export-not-a-real-secret
        run: python scripts/export_openapi.py
      - name: Fail if committed contract drifted from code
        run: git diff --exit-code -- contracts/openapi.yaml

  docker:
    name: docker (build + smoke + scan)
    needs: [backend, frontend, contract]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image (load locally for smoke test)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test (migrate + healthz + SPA deep link + API not swallowed)
        env:
          SMOKE_IMAGE: ${{ env.IMAGE }}:smoke
        run: |
          set -euo pipefail
          DATA="$RUNNER_TEMP/vocab-data"
          PEPPER="$RUNNER_TEMP/api-token-pepper"
          mkdir -p "$DATA"
          # The container runs as a fixed non-root UID (10001) that will not
          # match the runner user, so make the data dir world-writable. (The
          # NAS runbook instead pre-creates the dir owned by 10001:10001.)
          chmod 0777 "$DATA"
          python3 -c "import os; open('$PEPPER','wb').write(os.urandom(64))"
          chmod 0444 "$PEPPER"
          docker run -d --name vocab-smoke -p 18000:8000 \
            -v "$DATA:/app/data" \
            -v "$PEPPER:/run/secrets/api-token-pepper:ro" \
            -e DATABASE_URL=sqlite:////app/data/vocab.db \
            -e API_TOKEN_PEPPER_FILE=/run/secrets/api-token-pepper \
            -e PUBLIC_BASE_URL=http://localhost:18000 \
            -e TRUSTED_HOSTS=localhost,127.0.0.1 \
            -e CORS_ORIGINS=http://localhost:18000 \
            "$SMOKE_IMAGE"
          # Wait for migrations + readiness (DB migrated, schema == 0002).
          ready=0
          for i in $(seq 1 60); do
            if curl -sf http://localhost:18000/healthz/ready >/dev/null; then ready=1; break; fi
            sleep 1
          done
          if [ "$ready" != 1 ]; then echo "!! not ready"; docker logs vocab-smoke; exit 1; fi
          echo "ready after ${i}s"
          # healthz/live must be 200
          curl -sf http://localhost:18000/healthz/live >/dev/null
          # SPA root + deep link both serve index.html (200)
          [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18000/)" = "200" ]
          [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18000/daily/sessions/abc)" = "200" ]
          # OpenAPI served
          curl -sf http://localhost:18000/openapi.json >/dev/null
          # API route NOT swallowed by SPA fallback -> 401 (anonymous lacks scope)
          api_code="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:18000/api/v1/words)"
          [ "$api_code" = "401" ] || { echo "!! /api/v1/words returned $api_code (expected 401)"; exit 1; }
          echo "smoke OK"
      - name: Scan image (Trivy, HIGH/CRITICAL)
        # `trivyignores` points at the repo-root .trivyignore, which lists CVEs
        # deliberately accepted with a written justification (see deploy/README.md
        # §4 "已知接受的漏洞风险"). Re-evaluate on every dependency upgrade.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:smoke
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore

  publish:
    name: publish (GHCR latest + sha)
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (sha-<short> + latest on default branch)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
